AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Flyte 2 on EKS — data layer. S3 object store, Aurora Serverless v2 PostgreSQL
  (scale-to-zero capable), and a generated DB password in Secrets Manager.

Parameters:
  ClusterName:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  ClusterSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: The EKS cluster security group; Aurora allows 5432 from it.
  DBName:
    Type: String
    Default: flyte
  DBUsername:
    Type: String
    Default: flyte
  DBMinCapacity:
    Type: Number
    Default: 0
    Description: Aurora Serverless v2 min ACU. 0 enables scale-to-zero.
  DBMaxCapacity:
    Type: Number
    Default: 16
  EngineVersion:
    Type: String
    Default: "16.6"
    Description: Aurora PostgreSQL version (must support Serverless v2 scale-to-zero).

Resources:
  # ---- S3 object store ----
  DataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "flyte-${ClusterName}-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-mpu
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  # ---- ECR repository for Flyte task images ----
  # Developers push task images here; the nodes pull them (the node role has
  # AmazonEC2ContainerRegistryReadOnly). EmptyOnDelete lets the stack tear down
  # cleanly even with images present.
  TaskImageRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ClusterName}-flyte-tasks"
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE

  # ---- DB password (generated, never surfaced in a parameter) ----
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${ClusterName}/flyte/db"
      Description: Flyte Aurora PostgreSQL master credentials.
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DBUsername}"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludePunctuation: true

  # ---- Aurora Serverless v2 (PostgreSQL) ----
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${ClusterName} Flyte Aurora subnets"
      SubnetIds: !Ref PrivateSubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ClusterName} Flyte Aurora access"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ClusterSecurityGroupId
          Description: PostgreSQL from EKS cluster
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-aurora-sg"

  DBCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-postgresql
      EngineVersion: !Ref EngineVersion
      DatabaseName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      StorageEncrypted: true
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref DBMinCapacity
        MaxCapacity: !Ref DBMaxCapacity
      EnableCloudwatchLogsExports:
        - postgresql

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false

Outputs:
  BucketName:
    Value: !Ref DataBucket
  BucketArn:
    Value: !GetAtt DataBucket.Arn
  DBSecretArn:
    Value: !Ref DBSecret
  DBEndpoint:
    Value: !GetAtt DBCluster.Endpoint.Address
  DBPort:
    Value: !GetAtt DBCluster.Endpoint.Port
  DBName:
    Value: !Ref DBName
  DBUsername:
    Value: !Ref DBUsername
  EcrRepositoryUri:
    Description: ECR repository for Flyte task images (nodes can pull; developers push).
    Value: !GetAtt TaskImageRepository.RepositoryUri
