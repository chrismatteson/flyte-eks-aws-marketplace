AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Flyte 2 on EKS — auth layer (prod mode only). Cognito user pool + hosted UI +
  app client for OAuth2 login to the Flyte console and CLI (PKCE). The ACM
  certificate and Route 53 records are issued by the bootstrap (flyte.yaml)
  because ACM DNS validation cannot self-complete inside CloudFormation.

Parameters:
  ClusterName:
    Type: String
  DomainName:
    Type: String
    Description: Base domain, e.g. example.com. Flyte is served at flyte.<domain>.
  CognitoDomainPrefix:
    Type: String
    Description: Globally-unique prefix for the Cognito hosted UI domain.

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ClusterName}-flyte"
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref UserPool
      Identifier: https://flyte
      Name: flyte
      Scopes:
        - ScopeName: all
          ScopeDescription: Full Flyte access

  # Confidential client for the browser flow: ALB `authenticate-cognito` uses it
  # to run the console SSO login. Its callback is ALB's fixed /oauth2/idpresponse.
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ClusterName}-flyte-console"
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub "https://flyte.${DomainName}/oauth2/idpresponse"
      LogoutURLs:
        - !Sub "https://flyte.${DomainName}/logout"
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # Public (no-secret) PKCE client for the SDK/CLI. The API is protected by ALB
  # JWT validation, which accepts a valid Cognito token from any client; this one
  # lets `pyflyte` do an interactive PKCE login (localhost:53593 callback). CLI
  # auto-discovery of the IdP (runs.authMetadata) lands in a later chart bump.
  UserPoolClientCli:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ClusterName}-flyte-cli"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - http://localhost:53593/callback
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
  UserPoolClientId:
    Description: Confidential client id used by ALB authenticate-cognito.
    Value: !Ref UserPoolClient
  CliClientId:
    Description: Public PKCE client id for the SDK/CLI.
    Value: !Ref UserPoolClientCli
  CognitoDomainPrefix:
    Value: !Ref CognitoDomainPrefix
  CognitoDomain:
    Value: !Sub "${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
  Issuer:
    Description: OIDC issuer / JWT iss; JWKS is <issuer>/.well-known/jwks.json.
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
