AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Flyte 2 on EKS — cluster layer. EKS control plane, managed nodegroup in
  private subnets, core add-ons, and the EKS Pod Identity Agent (required for
  the S3 / ALB-controller Pod Identity associations).

Parameters:
  ClusterName:
    Type: String
  KubernetesVersion:
    Type: String
    Default: "1.31"
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Node + Aurora subnets (private).
  ClusterSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: All subnets (private + public) the control plane may place ENIs in.
  NodeInstanceType:
    Type: String
    Default: m6i.2xlarge
  NodeDesiredSize:
    Type: Number
    Default: 2
  NodeMinSize:
    Type: Number
    Default: 2
  NodeMaxSize:
    Type: Number
    Default: 6
  NodeDiskSize:
    Type: Number
    Default: 100

Resources:
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  Cluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt ClusterRole.Arn
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
        BootstrapClusterCreatorAdminPermissions: true
      ResourcesVpcConfig:
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
        SubnetIds: !Ref ClusterSubnetIds

  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  Nodegroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref Cluster
      NodeRole: !GetAtt NodeRole.Arn
      Subnets: !Ref PrivateSubnetIds
      AmiType: AL2023_x86_64_STANDARD
      CapacityType: ON_DEMAND
      InstanceTypes:
        - !Ref NodeInstanceType
      DiskSize: !Ref NodeDiskSize
      ScalingConfig:
        DesiredSize: !Ref NodeDesiredSize
        MinSize: !Ref NodeMinSize
        MaxSize: !Ref NodeMaxSize
      UpdateConfig:
        MaxUnavailable: 1
      Labels:
        workload: flyte

  # ---- Core add-ons ----
  # Pod Identity Agent first — Flyte + the ALB controller depend on it.
  AddonPodIdentityAgent:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref Cluster
      AddonName: eks-pod-identity-agent
      ResolveConflicts: OVERWRITE

  AddonVpcCni:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref Cluster
      AddonName: vpc-cni
      ResolveConflicts: OVERWRITE

  AddonKubeProxy:
    Type: AWS::EKS::Addon
    Properties:
      ClusterName: !Ref Cluster
      AddonName: kube-proxy
      ResolveConflicts: OVERWRITE

  AddonCoreDns:
    Type: AWS::EKS::Addon
    # CoreDNS needs schedulable nodes.
    DependsOn: Nodegroup
    Properties:
      ClusterName: !Ref Cluster
      AddonName: coredns
      ResolveConflicts: OVERWRITE

Outputs:
  ClusterName:
    Value: !Ref Cluster
  ClusterArn:
    Value: !GetAtt Cluster.Arn
  ClusterSecurityGroupId:
    Value: !GetAtt Cluster.ClusterSecurityGroupId
  OidcIssuer:
    Value: !GetAtt Cluster.OpenIdConnectIssuerUrl
  NodeRoleArn:
    Value: !GetAtt NodeRole.Arn
